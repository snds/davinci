<!doctype html>
<html data-theme="dark">
<head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .wrap { display: grid; grid-template-columns: auto 1fr; gap: 24px 28px; align-items: center; }
  .title { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .grid { display: grid; grid-template-columns: repeat(10, 28px); gap: 12px; }
  .icon { font-family: 'Material Symbols Rounded'; font-size: 22px; color: var(--fg); text-align: center; }
  .filled { font-variation-settings: 'FILL' 1; color: var(--accent); }
  .logo-row { display: flex; align-items: center; gap: 24px; }
  .logo-row img { height: 36px; }
</style>
</head>
<body>
<div class="card">
  <div class="wrap">
    <div class="title">Wordmark</div>
    <div class="logo-row">
      <img src="../assets/logo-wordmark.svg" alt="Davinci">
      <img src="../assets/logo-mark.svg" alt="mark">
    </div>
    <div class="title">Icons<br><span style="color: var(--fg-subtle); font-size: 10px;">Material Symbols Rounded</span></div>
    <div class="grid">
      <span class="icon">home</span>
      <span class="icon">search</span>
      <span class="icon filled">bookmark</span>
      <span class="icon">chat_bubble</span>
      <span class="icon filled">favorite</span>
      <span class="icon">notifications</span>
      <span class="icon">person</span>
      <span class="icon">work</span>
      <span class="icon">groups</span>
      <span class="icon">settings</span>
    </div>
  </div>
</div>
</body></html>
