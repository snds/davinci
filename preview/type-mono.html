<!doctype html>
<html data-theme="dark">
<head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="col" style="gap: 14px;">
    <div>
      <div class="label" style="margin-bottom: 6px;">JetBrains Mono — inline code</div>
      <div style="font-size: 14px;">Wrap snippets like <code>const palette = ['blue','sand','yellow']</code> inline with body copy.</div>
    </div>
    <div>
      <div class="label" style="margin-bottom: 6px;">Code block</div>
      <pre style="background: var(--bg-subtle); border: 1px solid var(--border-subtle); border-radius: 6px; padding: 12px 14px; font-family: var(--font-mono); font-size: 12.5px; color: var(--fg); margin: 0; line-height: 1.55;"><span style="color: var(--fg-muted);">// design-tokens.ts</span>
<span style="color: var(--accent-fg);">export const</span> tokens = {
  accent: <span style="color: var(--success-fg);">'var(--blue-9)'</span>,
  alt:    <span style="color: var(--success-fg);">'var(--yellow-9)'</span>,
}</pre>
    </div>
    <div>
      <div class="label" style="margin-bottom: 6px;">Tabular numerals</div>
      <div class="mono" style="font-size: 14px; font-variant-numeric: tabular-nums; color: var(--fg);">
        $1,284.00 &nbsp;&nbsp; +12.3% &nbsp;&nbsp; 00:42:18
      </div>
    </div>
  </div>
</div>
</body></html>
