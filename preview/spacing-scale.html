<!doctype html>
<html data-theme="dark">
<head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: flex-end; gap: 10px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--accent-subtle); border: 1px solid var(--accent-border); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .val  { font-family: var(--font-mono); font-size: 9px; color: var(--fg-subtle); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="item"><div class="box" style="width:2px; height:2px;"></div><div class="name">s-1</div><div class="val">2</div></div>
    <div class="item"><div class="box" style="width:4px; height:4px;"></div><div class="name">s-2</div><div class="val">4</div></div>
    <div class="item"><div class="box" style="width:8px; height:8px;"></div><div class="name">s-3</div><div class="val">8</div></div>
    <div class="item"><div class="box" style="width:12px; height:12px;"></div><div class="name">s-4</div><div class="val">12</div></div>
    <div class="item"><div class="box" style="width:16px; height:16px;"></div><div class="name">s-5</div><div class="val">16</div></div>
    <div class="item"><div class="box" style="width:20px; height:20px;"></div><div class="name">s-6</div><div class="val">20</div></div>
    <div class="item"><div class="box" style="width:24px; height:24px;"></div><div class="name">s-7</div><div class="val">24</div></div>
    <div class="item"><div class="box" style="width:32px; height:32px;"></div><div class="name">s-8</div><div class="val">32</div></div>
    <div class="item"><div class="box" style="width:40px; height:40px;"></div><div class="name">s-9</div><div class="val">40</div></div>
    <div class="item"><div class="box" style="width:48px; height:48px;"></div><div class="name">s-10</div><div class="val">48</div></div>
    <div class="item"><div class="box" style="width:64px; height:64px;"></div><div class="name">s-11</div><div class="val">64</div></div>
    <div class="item"><div class="box" style="width:80px; height:80px;"></div><div class="name">s-12</div><div class="val">80</div></div>
  </div>
</div>
</body></html>
