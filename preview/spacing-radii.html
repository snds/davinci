<!doctype html>
<html data-theme="dark">
<head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; gap: 18px; align-items: flex-end; justify-content: space-around; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 60px; background: var(--bg-surface); border: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg); }
  .val  { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="item"><div class="box" style="border-radius: var(--radius-xs)"></div><div class="name">xs</div><div class="val">2px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-sm)"></div><div class="name">sm</div><div class="val">4px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-md)"></div><div class="name">md ⭐</div><div class="val">6px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-lg)"></div><div class="name">lg</div><div class="val">8px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-xl)"></div><div class="name">xl</div><div class="val">12px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-2xl)"></div><div class="name">2xl</div><div class="val">16px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-full); width: 60px; height: 60px;"></div><div class="name">full</div><div class="val">9999px</div></div>
  </div>
</div>
</body></html>
