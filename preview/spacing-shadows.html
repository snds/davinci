<!doctype html>
<html data-theme="dark">
<head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; gap: 20px; justify-content: space-around; align-items: flex-end; padding: 24px 0 8px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 90px; height: 60px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 6px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg); }
  .val  { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="item"><div class="box" style="box-shadow: var(--shadow-xs);"></div><div class="name">xs</div><div class="val">1 layer</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-sm);"></div><div class="name">sm</div><div class="val">cards</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-md);"></div><div class="name">md</div><div class="val">popover</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-lg);"></div><div class="name">lg</div><div class="val">menu</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-xl);"></div><div class="name">xl</div><div class="val">modal</div></div>
  </div>
</div>
</body></html>
