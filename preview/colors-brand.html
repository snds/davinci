<!doctype html>
<html data-theme="dark">
<head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
  .sw { height: 44px; border-radius: 4px; position: relative; border: 1px solid rgba(255,255,255,0.04); }
  .sw span { position: absolute; bottom: -18px; left: 0; right: 0; text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .group { margin-bottom: 24px; }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 13px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: baseline; }
  .name small { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); font-weight: 400; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <div class="name">Blue <small>primary — accent</small></div>
    <div class="scale">
      <div class="sw" style="background: var(--blue-1)"><span>1</span></div>
      <div class="sw" style="background: var(--blue-2)"><span>2</span></div>
      <div class="sw" style="background: var(--blue-3)"><span>3</span></div>
      <div class="sw" style="background: var(--blue-4)"><span>4</span></div>
      <div class="sw" style="background: var(--blue-5)"><span>5</span></div>
      <div class="sw" style="background: var(--blue-6)"><span>6</span></div>
      <div class="sw" style="background: var(--blue-7)"><span>7</span></div>
      <div class="sw" style="background: var(--blue-8)"><span>8</span></div>
      <div class="sw" style="background: var(--blue-9); outline: 2px solid var(--blue-10); outline-offset: 2px;"><span>9★</span></div>
      <div class="sw" style="background: var(--blue-10)"><span>10</span></div>
      <div class="sw" style="background: var(--blue-11)"><span>11</span></div>
      <div class="sw" style="background: var(--blue-12)"><span>12</span></div>
    </div>
  </div>
  <div style="height: 12px;"></div>
  <div class="group">
    <div class="name">Yellow <small>alt brand</small></div>
    <div class="scale">
      <div class="sw" style="background: var(--yellow-1)"><span>1</span></div>
      <div class="sw" style="background: var(--yellow-2)"><span>2</span></div>
      <div class="sw" style="background: var(--yellow-3)"><span>3</span></div>
      <div class="sw" style="background: var(--yellow-4)"><span>4</span></div>
      <div class="sw" style="background: var(--yellow-5)"><span>5</span></div>
      <div class="sw" style="background: var(--yellow-6)"><span>6</span></div>
      <div class="sw" style="background: var(--yellow-7)"><span>7</span></div>
      <div class="sw" style="background: var(--yellow-8)"><span>8</span></div>
      <div class="sw" style="background: var(--yellow-9); outline: 2px solid var(--yellow-10); outline-offset: 2px;"><span>9★</span></div>
      <div class="sw" style="background: var(--yellow-10)"><span>10</span></div>
      <div class="sw" style="background: var(--yellow-11)"><span>11</span></div>
      <div class="sw" style="background: var(--yellow-12)"><span>12</span></div>
    </div>
  </div>
</div>
</body></html>
