<!doctype html>
<html data-theme="dark">
<head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<style>
  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined';
    font-weight: normal; font-style: normal;
    font-size: 22px; line-height: 1; letter-spacing: normal;
    text-transform: none; display: inline-block;
    white-space: nowrap; word-wrap: normal; direction: ltr;
    -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
    vertical-align: middle;
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
</style>
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 11px; font-weight: 600; color: var(--fg-muted); }
  .input, .textarea, .select {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: var(--radius-md);
    padding: 7px 10px;
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
  }
  .input:focus, .textarea:focus, .select:focus { border-color: var(--border-focus); box-shadow: var(--shadow-focus); }
  .input::placeholder { color: var(--fg-subtle); }
  .hint { font-size: 11px; color: var(--fg-subtle); }
  .err { font-size: 11px; color: var(--danger-fg); }
  .input.invalid { border-color: var(--danger); }
  .input-with-icon { position: relative; }
  .input-with-icon .material-symbols-outlined { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--fg-subtle); }
  .input-with-icon input { padding-left: 30px; width: 100%; box-sizing: border-box; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="field">
      <label>Full name</label>
      <input class="input" value="Ada Lovelace">
      <div class="hint">Default — filled</div>
    </div>
    <div class="field">
      <label>Email</label>
      <div class="input-with-icon">
        <span class="material-symbols-outlined"></span>
        <input class="input" placeholder="you@company.com">
      </div>
      <div class="hint">With leading icon</div>
    </div>
    <div class="field">
      <label>Title</label>
      <input class="input invalid" value="" placeholder="Required">
      <div class="err">This field is required</div>
    </div>
    <div class="field">
      <label>Role</label>
      <select class="select">
        <option>Designer</option>
        <option>Engineer</option>
        <option>Product</option>
      </select>
      <div class="hint">Select</div>
    </div>
  </div>
</div>
</body></html>
