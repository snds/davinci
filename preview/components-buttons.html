<!doctype html>
<html data-theme="dark">
<head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<style>
  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined';
    font-weight: normal; font-style: normal;
    font-size: 22px; line-height: 1; letter-spacing: normal;
    text-transform: none; display: inline-block;
    white-space: nowrap; word-wrap: normal; direction: ltr;
    -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
    vertical-align: middle;
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
</style>
<style>
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    border-radius: var(--radius-md);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all var(--dur-fast) var(--ease-out);
    line-height: 1;
  }
  .btn-primary { background: var(--accent); color: var(--fg-on-accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--bg-surface); color: var(--fg); border-color: var(--border); }
  .btn-secondary:hover { background: var(--bg-hover); }
  .btn-ghost { background: transparent; color: var(--fg); }
  .btn-ghost:hover { background: var(--bg-hover); }
  .btn-alt { background: var(--alt); color: var(--fg-on-alt); }
  .btn-alt:hover { background: var(--alt-hover); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-link { background: transparent; color: var(--accent-fg); padding: 7px 8px; }
  .btn[disabled] { opacity: 0.4; cursor: not-allowed; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 4px; }
  .btn-lg { padding: 10px 18px; font-size: 14px; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 6px; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Variants</div>
  <div class="row" style="margin-bottom: 14px;">
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-alt">Alt</button>
    <button class="btn btn-danger">Destructive</button>
    <button class="btn btn-link">Link</button>
  </div>
  <div class="label">Sizes · States</div>
  <div class="row">
    <button class="btn btn-primary btn-sm">Small</button>
    <button class="btn btn-primary">Medium</button>
    <button class="btn btn-primary btn-lg">Large</button>
    <button class="btn btn-primary btn-lg"><span class="material-symbols-outlined" style="font-size: 16px;"></span>With icon</button>
    <button class="btn btn-primary" disabled>Disabled</button>
  </div>
</div>
</body></html>
