<!doctype html>
<html data-theme="dark">
<head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .specimen { display: grid; grid-template-columns: 56px 1fr auto; gap: 18px; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed var(--border-subtle); }
  .specimen:last-child { border-bottom: none; }
  .label { align-self: center; }
  .meta { text-align: right; font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); white-space: nowrap; }
</style>
</head>
<body>
<div class="card">
  <div class="specimen">
    <span class="label">H1</span>
    <span style="font-family: var(--font-display); font-weight: 800; font-size: 48px; line-height: 1.05; letter-spacing: -0.02em;">Renaissance in pixels</span>
    <span class="meta">48 / 800 / -0.02em</span>
  </div>
  <div class="specimen">
    <span class="label">H2</span>
    <span style="font-family: var(--font-display); font-weight: 700; font-size: 30px; letter-spacing: -0.01em;">Proportion and balance</span>
    <span class="meta">30 / 700 / -0.01em</span>
  </div>
  <div class="specimen">
    <span class="label">H3</span>
    <span style="font-family: var(--font-display); font-weight: 600; font-size: 20px; letter-spacing: -0.01em;">Craft the composition</span>
    <span class="meta">20 / 600</span>
  </div>
  <div class="specimen">
    <span class="label">H4</span>
    <span style="font-family: var(--font-display); font-weight: 600; font-size: 17px;">Details that matter</span>
    <span class="meta">17 / 600</span>
  </div>
</div>
</body></html>
