# ============================================================
# Davinci Design System — GitHub Pages deploy
#
# Publishes three artifacts under https://snds.github.io/davinci/ :
#   • /              → Docusaurus docs site
#   • /storybook/    → Storybook static build
#   • /app/          → LinkedIn-style demo app (uses davinci.css)
#
# Triggers:
#   • Push to feat/docs-dogfood (the active working branch)
#   • Manual dispatch
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [feat/docs-dogfood]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish (don't cancel
# a publish midway).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        env:
          STORYBOOK_URL: https://snds.github.io/davinci/storybook/
          DEMO_URL: https://snds.github.io/davinci/app/
        run: npm run build -w docs

      - name: Build Storybook
        run: npm run build-storybook -w storybook

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site
          # 1. Docusaurus at the root
          cp -r docs/build/. _site/
          # 2. Storybook at /storybook
          mkdir -p _site/storybook
          cp -r storybook/storybook-static/. _site/storybook/
          # 3. Demo app at /app — no-build static React (CDN + Babel)
          mkdir -p _site/app
          cp -r ui_kits/web_app/. _site/app/
          # The demo's index.html loads ../../colors_and_type.css; that
          # path doesn't exist once flattened under /app, so colocate the
          # token files and rewrite the link. colors_and_type.css does
          # @import './palette.css', so palette.css must sit beside it.
          cp colors_and_type.css palette.css _site/app/
          sed -i 's#\.\./\.\./colors_and_type\.css#colors_and_type.css#g' _site/app/index.html
          # Disable Jekyll so paths beginning with _ are served as-is.
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
